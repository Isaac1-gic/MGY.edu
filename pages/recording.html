<!DOCTYPE html>
<html>
<head>
    <title>Audio Recorder to Firebase</title>
    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-storage-compat.js"></script>
</head>
<body>

    <h2>Audio Recorder</h2>
    <button id="recordBtn">Start Recording</button>
    <button id="stopBtn" disabled>Stop & Save</button>

    <h3>Saved Recordings</h3>
    <ul id="recordingsList"></ul>

    <script >
// app.js

// 1. Your Firebase Configuration (Get this from your Firebase Console)
const firebaseConfig = {
    apiKey: "AIzaSyD1CmCEhsvyKoTrwnuMtJqu9JkiMvJterk",
    authDomain: "msce-g-studies-tracker-baa6f.firebaseapp.com",
    databaseURL: "https://msce-g-studies-tracker-baa6f-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "msce-g-studies-tracker-baa6f",
    storageBucket: "msce-g-studies-tracker-baa6f.firebasestorage.app",
    messagingSenderId: "1082032866052",
    appId: "1:1082032866052:web:212d976ac9663306c70651",
    measurementId: "G-0VTT4D856F"
  };

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const database = firebase.database();
const storage = firebase.storage();

let mediaRecorder;
let audioChunks = [];

const recordBtn = document.getElementById('recordBtn');
const stopBtn = document.getElementById('stopBtn');

// --- START RECORDING ---
recordBtn.onclick = async () => {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    
    audioChunks = []; // Reset chunks for new recording
    
    mediaRecorder.ondataavailable = (event) => {
        audioChunks.push(event.data);
    };

    mediaRecorder.onstop = async () => {
        // Create the audio file (Blob)
        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
        uploadAudio(audioBlob);
    };

    mediaRecorder.start();
    recordBtn.disabled = true;
    stopBtn.disabled = false;
};

// --- STOP RECORDING ---
stopBtn.onclick = () => {
    mediaRecorder.stop();
    recordBtn.disabled = false;
    stopBtn.disabled = true;
};

// --- UPLOAD TO FIREBASE ---
async function uploadAudio(blob) {
    const fileName = `recordings/${Date.now()}.webm`;
    const storageRef = storage.ref(fileName);

    // 1. Upload the file to Firebase Storage
    const snapshot = await storageRef.put(blob);
    
    // 2. Get the permanent download URL
    const downloadURL = await snapshot.ref.getDownloadURL();

    // 3. Save the URL to Realtime Database
    database.ref('audio_logs').push({
        url: downloadURL,
        timestamp: Date.now()
    });

    alert("Audio saved to Firebase!");
}
	</script>
</body>
</html>
